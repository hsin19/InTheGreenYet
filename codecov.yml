# CI runs both the SPA and Worker test suites on every PR in one job, uploading the
# `frontend` (coverage/) and `backend` (coverage-worker/) flags each time.
# carryforward is kept only as a safety net should an upload step ever fail.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: frontend
      paths:
        - src
      carryforward: true
    - name: backend
      paths:
        - worker
      carryforward: true

comment:
  layout: 'condensed_header, flags, files'
  require_changes: false

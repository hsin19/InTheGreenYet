name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the check on moderate-or-higher severity advisories.
          fail-on-severity: moderate
          # Surface a summary table in the PR for quick eyeballing.
          comment-summary-in-pr: on-failure

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'worker/**'
      - 'shared/**'
      - 'public/**'
      - 'index.html'
      - 'wrangler.jsonc'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'lingui.config.ts'
      - 'pwa-assets.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      # Builds the SPA client AND the Worker bundle via @cloudflare/vite-plugin,
      # emitting dist/ plus the .wrangler/deploy redirect that `wrangler deploy`
      # picks up. VITE_API_BASE_URL is intentionally unset → the SPA calls /api
      # on the same (Worker) origin.
      - name: Build
        run: pnpm run build

      # Refuse to push an empty NOTION_CLIENT_ID: an empty GitHub var would silently
      # overwrite the live Worker secret and break login (the SPA fetches it from
      # /api/public-config to build the OAuth authorize URL).
      - name: Verify required vars
        run: |
          if [ -z "${{ vars.NOTION_CLIENT_ID }}" ]; then
            echo "::error::vars.NOTION_CLIENT_ID is empty — refusing to overwrite the Worker secret"
            exit 1
          fi

      # One deploy uploads the Worker + the client assets together (single origin).
      # wrangler-action `secrets:` works for Workers (it would NOT for Pages).
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: deploy
          secrets: |
            NOTION_CLIENT_ID
            NOTION_CLIENT_SECRET
        env:
          NOTION_CLIENT_ID: ${{ vars.NOTION_CLIENT_ID }}
          NOTION_CLIENT_SECRET: ${{ secrets.NOTION_CLIENT_SECRET }}

name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
      - '.github/workflows/deploy-frontend.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
      - '.github/workflows/deploy-frontend.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Check
        run: pnpm run format:check

      - name: Lint Check
        run: pnpm --filter @inthegreenyet/frontend lint

      - name: Run Tests
        run: pnpm --filter @inthegreenyet/frontend test

      - name: Build Frontend
        env:
          VITE_NOTION_CLIENT_ID: ${{ vars.NOTION_CLIENT_ID }}
          VITE_API_BASE_URL: https://inthegreenyet.${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev
        run: pnpm --filter @inthegreenyet/frontend build

      - name: Smoke (vite preview + headless render)
        run: |
          pnpm --filter @inthegreenyet/frontend preview -- --port 4173 --strictPort --host 127.0.0.1 > /tmp/vite.log 2>&1 &
          PID=$!

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1; then
              echo "Preview ready after ${i}s"
              break
            fi
            sleep 1
          done

          google-chrome --headless --dump-dom --virtual-time-budget=5000 \
            --disable-gpu --no-sandbox \
            http://127.0.0.1:4173 > /tmp/rendered.html 2> /tmp/chrome.log

          grep -q 'Connect to Notion' /tmp/rendered.html
          kill $PID || true

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== vite.log ==="
          cat /tmp/vite.log 2>/dev/null || echo "(no vite log)"
          echo "=== chrome.log ==="
          cat /tmp/chrome.log 2>/dev/null || echo "(no chrome log)"
          echo "=== rendered.html (first 2KB) ==="
          head -c 2048 /tmp/rendered.html 2>/dev/null || echo "(no rendered dump)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
      - '.github/workflows/deploy-frontend.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-frontend.yml'
      - '.github/workflows/deploy-frontend.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Format Check
        run: npm run format:check

      - name: Lint Check
        run: npm run lint --workspace=@inthegreenyet/frontend

      - name: Run Tests
        run: npm run test --workspace=@inthegreenyet/frontend

      - name: Build Frontend
        env:
          VITE_NOTION_CLIENT_ID: ${{ vars.NOTION_CLIENT_ID }}
          VITE_API_BASE_URL: https://inthegreenyet.${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev
        run: npm run build --workspace=@inthegreenyet/frontend

      - name: Smoke (vite preview + headless render)
        run: |
          npm run preview --workspace=@inthegreenyet/frontend -- --port 4173 --strictPort --host 127.0.0.1 > /tmp/vite.log 2>&1 &
          PID=$!

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1; then
              echo "Preview ready after ${i}s"
              break
            fi
            sleep 1
          done

          google-chrome --headless --dump-dom --virtual-time-budget=5000 \
            --disable-gpu --no-sandbox \
            http://127.0.0.1:4173 > /tmp/rendered.html

          grep -q 'Connect to Notion' /tmp/rendered.html
          kill $PID || true

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== vite.log ==="
          cat /tmp/vite.log 2>/dev/null || echo "(no vite log)"
          echo "=== rendered.html (first 2KB) ==="
          head -c 2048 /tmp/rendered.html 2>/dev/null || echo "(no rendered dump)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

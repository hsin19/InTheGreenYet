name: Deploy Backend Worker

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Check
        run: pnpm run format:check

      - name: Lint Check
        run: pnpm --filter @inthegreenyet/backend lint

      - name: Typecheck
        run: pnpm --filter @inthegreenyet/backend typecheck

      - name: Run Tests
        run: pnpm --filter @inthegreenyet/backend test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: backend/test-report.junit.xml
          flags: backend

      - name: Build Check (Dry Run)
        working-directory: backend
        run: pnpm exec wrangler deploy --dry-run

      - name: Smoke (wrangler dev /health)
        run: |
          cat > backend/.dev.vars <<EOF
          NOTION_CLIENT_ID=dummy
          NOTION_CLIENT_SECRET=dummy
          FRONTEND_URL=http://127.0.0.1:4173
          EOF

          pnpm --filter @inthegreenyet/backend dev -- --port 8787 --ip 127.0.0.1 > /tmp/wrangler.log 2>&1 &
          PID=$!

          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8787/health >/dev/null 2>&1; then
              echo "Worker ready after ${i}s"
              break
            fi
            sleep 1
          done

          echo "--- /health ---"
          curl -fsS http://127.0.0.1:8787/health
          echo
          curl -fsS http://127.0.0.1:8787/health | grep -q '"status":"ok"'
          kill $PID || true
          rm -f backend/.dev.vars

      - name: Dump wrangler log on failure
        if: failure()
        run: |
          echo "=== wrangler.log ==="
          cat /tmp/wrangler.log 2>/dev/null || echo "(no wrangler log)"

      - name: Deploy Worker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: backend
          command: deploy
          secrets: |
            NOTION_CLIENT_ID
            NOTION_CLIENT_SECRET
            FRONTEND_URL
        env:
          NOTION_CLIENT_ID: ${{ vars.NOTION_CLIENT_ID }}
          NOTION_CLIENT_SECRET: ${{ secrets.NOTION_CLIENT_SECRET }}
          FRONTEND_URL: https://${{ vars.CLOUDFLARE_PAGE_NAME }}.pages.dev

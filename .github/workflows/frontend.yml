name: Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Check
        run: pnpm run format:check

      - name: Lint Check
        run: pnpm --filter @inthegreenyet/frontend lint

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm --filter @inthegreenyet/frontend exec playwright install --with-deps chromium

      - name: Run Tests
        run: pnpm --filter @inthegreenyet/frontend test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: frontend/coverage
          flags: frontend
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: frontend/test-report.junit.xml
          flags: frontend

      - name: Build Frontend
        env:
          VITE_NOTION_CLIENT_ID: ${{ vars.NOTION_CLIENT_ID }}
          VITE_API_BASE_URL: https://inthegreenyet.${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev
        run: pnpm --filter @inthegreenyet/frontend build

      - name: Smoke (vite preview + headless render)
        run: |
          pnpm --filter @inthegreenyet/frontend preview --port 4173 --strictPort --host 127.0.0.1 > /tmp/vite.log 2>&1 &
          PID=$!

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1; then
              echo "Preview ready after ${i}s"
              break
            fi
            sleep 1
          done

          google-chrome --headless --dump-dom --virtual-time-budget=5000 \
            --disable-gpu --no-sandbox \
            http://127.0.0.1:4173 > /tmp/rendered.html 2> /tmp/chrome.log

          grep -q 'Connect to Notion' /tmp/rendered.html
          kill $PID || true

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== vite.log ==="
          cat /tmp/vite.log 2>/dev/null || echo "(no vite log)"
          echo "=== chrome.log ==="
          cat /tmp/chrome.log 2>/dev/null || echo "(no chrome log)"
          echo "=== rendered.html (first 2KB) ==="
          head -c 2048 /tmp/rendered.html 2>/dev/null || echo "(no rendered dump)"

      - name: Create Pages project
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm --filter @inthegreenyet/frontend exec wrangler pages project create ${{ vars.CLOUDFLARE_PAGE_NAME }} --production-branch ${{ github.event.repository.default_branch }} || true

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: frontend
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGE_NAME }} --branch ${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

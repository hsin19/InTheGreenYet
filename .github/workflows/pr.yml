name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Format Check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # Runs both suites: the SPA (node + Chromium browser) and the Worker pool.
      - name: Test
        run: pnpm run test:ci

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          flags: frontend
          fail_ci_if_error: false

      - name: Upload worker coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage-worker
          flags: backend
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: test-report.junit.xml,worker-test-report.junit.xml

      - name: Build
        run: pnpm run build

  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    env:
      WRANGLER_SEND_METRICS: 'false'
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke (browser → Worker → mock Notion)
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure

  auto-merge:
    name: Auto-merge Dependabot
    needs: [checks, e2e, dependency-review]
    if: ${{ success() && github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Squash-merge the PR
        run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN }}

  jules-fix:
    name: Jules fix on failure
    needs: [checks, e2e, dependency-review]
    if: ${{ failure() && github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Invoke Jules
        uses: google-labs-code/jules-action@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.head_ref }}
          include_last_commit: true
          prompt: |
            A Dependabot dependency update on branch `${{ github.head_ref }}` is failing the PR checks (${{ github.event.pull_request.html_url }}).

            This is a single-package pnpm project: a Vite + React 19 SPA in `src/` plus a Cloudflare Worker in `worker/`, built with `@cloudflare/vite-plugin` and deployed as ONE Worker that serves the SPA static assets and the `/api`, `/auth` routes on a single origin. Review `AGENTS.md` for the full tech stack context. Run all commands from the repo root.

            Please:
            1. Run `pnpm install --frozen-lockfile`, then `pnpm run check` (format, lint, real typecheck, tests, build) to reproduce the failure.
            2. Make the change needed to make `pnpm run check` pass, scoped to the dependency update. Editing `package.json` and `pnpm-lock.yaml` to align dependency versions IS the expected fix and is explicitly IN SCOPE — including dev/test dependencies and transitive peers (e.g. vitest, lingui, wrangler, @cloudflare/vite-plugin). This is NOT "unrelated code". "Unrelated code" / "do not touch" refers to application source logic and runtime behavior — do NOT change those.
            3. Common causes, all in scope to fix:
               - A package bumped without its peers — e.g. `@lingui/react` updated but `@lingui/core` / `@lingui/cli` / `@lingui/swc-plugin` / `@lingui/vite-plugin` left behind, producing a type mismatch. Bump the peers to the matching version.
               - A version skew in `pnpm-lock.yaml` — e.g. `vitest` resolving to two versions, or `wrangler` not satisfying the `@cloudflare/vite-plugin` peer range. Align the versions (bump in `package.json` and/or `pnpm dedupe`) so a single version resolves.
               In all cases, run `pnpm install` (without `--frozen-lockfile`) to update `pnpm-lock.yaml` to match.
            4. Source-code edits ARE in scope when a dependency changed its API and call sites must be adapted to keep the SAME behavior — e.g. a renamed export, changed function signature, or moved import path. That mechanical, behavior-preserving migration is expected. What stays OUT of scope: changing what the app does, refactoring beyond the migration, or guessing at intent. If the migration is non-trivial/ambiguous, or you would be guessing, do NOT force it — leave a PR comment describing what is blocking instead.
            5. Before opening the PR, run `pnpm run check` once more and confirm it passes. You start from branch `${{ github.head_ref }}` (the Dependabot branch), so your work already includes the dependency bump plus your fix. Open a pull request with that combined change. Give it a clear title and a description that states the root cause of the failure and what you changed to fix it, and link the original Dependabot PR (${{ github.event.pull_request.html_url }}).
